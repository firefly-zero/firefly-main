[package]
name = "firefly-main"
version = "0.1.0"
rust-version = "1.84.0"
edition = "2021"

[dependencies]
firefly-hal = { path = "../firefly-hal" }
firefly-runtime = { path = "../firefly/firefly-runtime" }
esp-backtrace = { version = "0.15.0", features = [
    "esp32s3",
    "exception-handler",
    "panic-handler",
    "println",
] }
esp-hal = { version = "0.23.1", features = ["esp32s3"] }
esp-println = { version = "0.13.0", features = ["esp32s3"] }
esp-alloc = { version = "0.6.0" }
critical-section = "1.2.0"
embedded-graphics = "0.8.1"
embedded-hal-bus = "0.3.0"
# https://github.com/rust-embedded-community/embedded-sdmmc-rs/issues/168
embedded-sdmmc = { git = "https://github.com/rust-embedded-community/embedded-sdmmc-rs" }
ili9488 = { path = "/home/gram/my/ili9488" }
fugit = "0.3.7"

[profile.release]
strip = true             # Automatically strip symbols from the binary.
codegen-units = 1        # LLVM can perform better optimizations using a single thread
debug-assertions = false
incremental = false
lto = "fat"
opt-level = "z"          # Optimize for size.
overflow-checks = false
panic = "abort"
