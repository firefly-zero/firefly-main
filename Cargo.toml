[package]
name = "firefly-main"
version = "0.1.0"
rust-version = "1.84.0"
edition = "2021"

[dependencies]
firefly-hal = { path = "../firefly-hal" }
firefly-runtime = { path = "../firefly/firefly-runtime" }
esp-backtrace = { version = "0.15.0", features = [
    "esp32s3",
    "exception-handler",
    "panic-handler",
    "println",
] }
esp-hal = { version = "0.23.1", git = "https://github.com/esp-rs/esp-hal.git", features = [
    "esp32s3",
    "psram",
    "unstable",
] }
esp-println = { version = "0.13.0", features = [
    "esp32s3",
    "uart",
], default-features = false }
esp-alloc = { version = "0.6.0" }
critical-section = "1.2.0"
embedded-graphics = "0.8.1"
embedded-hal-bus = "0.3.0"
# A temporary fork of the latest dev version of embedded-sdmmc.
# We'll switch to upstream when they push to crate the version >0.8.1.
embedded_sdmmc = { version = "0.8.2", default-features = false, package = "embedded-sdmmc-dev" }

[profile.release]
strip = true             # Automatically strip symbols from the binary.
codegen-units = 1        # LLVM can perform better optimizations using a single thread
debug-assertions = false
incremental = false
lto = "fat"
opt-level = "z"          # Optimize for size.
overflow-checks = false
panic = "abort"
