[package]
name = "firefly-supervisor"
version = "0.1.0"
edition = "2021"

[dependencies]
firefly-hal = { path = "../firefly-hal" }
firefly-runtime = { path = "../firefly/firefly-runtime" }

esp-backtrace = { version = "0.14.2", features = [
    "esp32s3",
    "exception-handler",
    "panic-handler",
    "println",
] }
esp-hal = { version = "0.22.0", features = ["esp32s3"] }
esp-println = { version = "0.12.0", features = ["esp32s3"] }
esp-alloc = { version = "0.5.0" }
critical-section = "1.2.0"
embedded-graphics = "0.8.1"
ili9341 = "0.6.0"
mipidsi = "0.8.0"
display-interface-spi = "0.5.0"
byte-slice-cast = { version = "1.2.2", default-features = false }
display-interface = { version = "0.5.0", default-features = false }
num-traits = { version = "0.2.19", default-features = false }
embedded-hal-bus = "0.2.0"
embedded-sdmmc = { version = "0.8.1", default-features = false }

[profile.dev]
# Rust debug is too slow.
# For debug builds always builds with some optimization
opt-level = "s"

[profile.release]
strip = true             # Automatically strip symbols from the binary.
codegen-units = 1        # LLVM can perform better optimizations using a single thread
debug-assertions = false
incremental = false
lto = 'fat'
opt-level = "z"          # Optimize for size.
overflow-checks = false
